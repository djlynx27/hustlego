name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase-seed.sql'

jobs:
  migrate:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve Supabase project ref
        shell: bash
        run: |
          set -euo pipefail

          raw="${SUPABASE_PROJECT_ID:-}"
          if [[ -z "$raw" ]]; then
            echo "SUPABASE_PROJECT_ID secret is empty"
            exit 1
          fi

          # Trim quotes/whitespace from secret value.
          clean="$(echo "$raw" | tr -d '[:space:]' | sed -E "s/^['\"]//; s/['\"]$//")"
          ref=""

          # 1) Direct project ref
          if [[ "$clean" =~ ^[a-z0-9]{20}$ ]]; then
            ref="$clean"
          fi

          # 2) API URL: https://<ref>.supabase.co
          if [[ -z "$ref" && "$clean" =~ ^https?://([a-z0-9]{20})\.supabase\.co(/.*)?$ ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 3) Dashboard URL: https://app.supabase.com/project/<ref>
          if [[ -z "$ref" && "$clean" =~ /project/([a-z0-9]{20})($|[/?#]) ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 4) Last resort: first 20-char lowercase/number token inside the string
          if [[ -z "$ref" ]]; then
            ref="$(echo "$clean" | grep -Eo '[a-z0-9]{20}' | head -n 1 || true)"
          fi

          # 5) Fallback: infer from Supabase account projects if secret is invalid.
          if [[ -z "$ref" ]]; then
            echo "SUPABASE_PROJECT_ID not directly parseable, trying account project lookup..."
            projects_json="$(supabase projects list --output json || true)"
            inferred_ref="$(PROJECTS_JSON="$projects_json" python3 - <<'PY'
import json
import os

raw = os.environ.get("PROJECTS_JSON", "")
try:
    data = json.loads(raw)
except Exception:
    print("")
    raise SystemExit

items = data if isinstance(data, list) else data.get("projects", []) if isinstance(data, dict) else []
refs = []
for item in items:
    if not isinstance(item, dict):
        continue
    for key in ("id", "ref", "project_ref", "reference_id"):
        value = item.get(key)
        if isinstance(value, str) and len(value) == 20 and value.isalnum() and value == value.lower():
            refs.append(value)

unique_refs = list(dict.fromkeys(refs))
print(unique_refs[0] if len(unique_refs) == 1 else "")
PY
            )"

            if [[ -n "$inferred_ref" ]]; then
              ref="$inferred_ref"
              echo "Using inferred project ref from account projects list."
            fi
          fi

          if [[ ! "$ref" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_ID format: '$raw'"
            echo "Expected one of:"
            echo "- project ref: abcdefghijklmnopqrst"
            echo "- API URL: https://abcdefghijklmnopqrst.supabase.co"
            echo "- Dashboard URL: https://app.supabase.com/project/abcdefghijklmnopqrst"
            echo "Tip: if your token can access exactly one project, this workflow can auto-detect it."
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=$ref" >> "$GITHUB_ENV"
          echo "Resolved Supabase project ref: $ref"

      - name: Push migrations to Supabase
        run: supabase db push --project-id "$SUPABASE_PROJECT_REF"

      - name: Run seed SQL (optional demo data)
        run: |
          supabase db execute --file supabase-seed.sql --project-id "$SUPABASE_PROJECT_REF"

      - name: Log migration status
        run: echo "✅ Supabase migrations applied successfully"
