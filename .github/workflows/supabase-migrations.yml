name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase-seed.sql'

jobs:
  migrate:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve Supabase project ref
        shell: bash
        run: |
          set -euo pipefail

          raw="${SUPABASE_PROJECT_ID:-}"
          if [[ -z "$raw" ]]; then
            echo "SUPABASE_PROJECT_ID secret is empty"
            exit 1
          fi

          # Accept either a direct project ref (abcdefghijklmnopqrst)
          # or a URL like https://abcdefghijklmnopqrst.supabase.co
          ref="$(echo "$raw" | sed -E 's#^https?://##; s#/.*$##; s#\.supabase\.co$##')"

          if [[ ! "$ref" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_ID format: '$raw'"
            echo "Expected a 20-char project ref like 'abcdefghijklmnopqrst'"
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=$ref" >> "$GITHUB_ENV"
          echo "Resolved Supabase project ref: $ref"

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations to Supabase
        run: supabase db push --project-id "$SUPABASE_PROJECT_REF"

      - name: Run seed SQL (optional demo data)
        run: |
          supabase db execute --file supabase-seed.sql --project-id "$SUPABASE_PROJECT_REF"

      - name: Log migration status
        run: echo "✅ Supabase migrations applied successfully"
