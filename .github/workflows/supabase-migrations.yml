name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase-seed.sql'

jobs:
  migrate:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve, link, and deploy migrations
        shell: bash
        run: |
          set -euo pipefail

          raw="${SUPABASE_PROJECT_ID:-}"
          if [[ -z "$raw" ]]; then
            echo "SUPABASE_PROJECT_ID secret is empty"
            exit 1
          fi

          # Trim quotes/whitespace from secret value.
          clean="$(echo "$raw" | tr -d '[:space:]' | sed -E "s/^['\"]//; s/['\"]$//")"
          ref=""

          # 1) Direct project ref (Supabase ref: 20 lowercase letters)
          if [[ "$clean" =~ ^[a-z]{20}$ ]]; then
            ref="$clean"
          fi

          # 2) API URL: https://<ref>.supabase.co
          if [[ -z "$ref" && "$clean" =~ ^https?://([a-z]{20})\.supabase\.co(/.*)?$ ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 3) Dashboard URL: https://app.supabase.com/project/<ref>
          if [[ -z "$ref" && "$clean" =~ /project/([a-z]{20})($|[/?#]) ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 4) Last resort: first 20-char lowercase token inside the string
          if [[ -z "$ref" ]]; then
            ref="$(echo "$clean" | grep -Eo '[a-z]{20}' | head -n 1 || true)"
          fi

          # 5) Fallback from Supabase account projects list.
          if [[ -z "$ref" ]]; then
            listed_ref="$(supabase projects list 2>/dev/null | grep -Eo '[a-z]{20}' | head -n 1 || true)"
            if [[ -n "$listed_ref" ]]; then
              ref="$listed_ref"
              echo "Using project ref from 'supabase projects list'."
            fi
          fi

          if [[ ! "$ref" =~ ^[a-z]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_ID format."
            echo "Expected one of:"
            echo "- project ref: abcdefghijklmnopqrst"
            echo "- API URL: https://abcdefghijklmnopqrst.supabase.co"
            echo "- Dashboard URL: https://app.supabase.com/project/abcdefghijklmnopqrst"
            exit 1
          fi

          echo "Resolved Supabase project ref length: ${#ref}"

          supabase link --project-ref "$ref"
          supabase db push
          supabase db execute --file supabase-seed.sql

      - name: Log migration status
        run: echo "✅ Supabase migrations applied successfully"
