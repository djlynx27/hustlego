name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase-seed.sql'

jobs:
  migrate:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Resolve, link, and deploy migrations
        shell: bash
        run: |
          set -euo pipefail

          raw="${SUPABASE_PROJECT_ID:-}"
          if [[ -z "$raw" ]]; then
            echo "SUPABASE_PROJECT_ID secret is empty"
            exit 1
          fi

          # Trim quotes/whitespace from secret value.
          clean="$(echo "$raw" | tr -d '[:space:]' | sed -E "s/^['\"]//; s/['\"]$//")"
          ref=""

          # 1) Direct project ref (Supabase ref: 20 lowercase alphanumeric chars)
          if [[ "$clean" =~ ^[a-z0-9]{20}$ ]]; then
            ref="$clean"
          fi

          # 2) API URL: https://<ref>.supabase.co
          if [[ -z "$ref" && "$clean" =~ ^https?://([a-z0-9]{20})\.supabase\.co(/.*)?$ ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 3) Dashboard URL: https://app.supabase.com/project/<ref>
          if [[ -z "$ref" && "$clean" =~ /project/([a-z0-9]{20})($|[/?#]) ]]; then
            ref="${BASH_REMATCH[1]}"
          fi

          # 4) Last resort: first 20-char lowercase alphanumeric token inside the string
          if [[ -z "$ref" ]]; then
            ref="$(echo "$clean" | grep -Eo '[a-z0-9]{20}' | head -n 1 || true)"
          fi

          if [[ ! "$ref" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_ID format."
            echo "Expected one of:"
            echo "- project ref: abcdefghijklmnopqrst"
            echo "- API URL: https://abcdefghijklmnopqrst.supabase.co"
            echo "- Dashboard URL: https://app.supabase.com/project/abcdefghijklmnopqrst"
            exit 1
          fi

          echo "Resolved Supabase project ref length: ${#ref}"

          # Try linking with the parsed ref first. If Supabase rejects format,
          # retry with common OCR/typing fixes from copied URLs.
          linked_ref=""
          candidates=("$ref")
          normalized_ref="$(echo "$ref" | tr '10' 'lo')"
          if [[ "$normalized_ref" != "$ref" ]]; then
            candidates+=("$normalized_ref")
          fi

          for candidate in "${candidates[@]}"; do
            echo "Trying project ref candidate (len=${#candidate})"
            if supabase link --project-ref "$candidate" >/tmp/supabase_link.log 2>&1; then
              linked_ref="$candidate"
              break
            fi
          done

          if [[ -z "$linked_ref" ]]; then
            echo "Failed to link project. Supabase output:"
            cat /tmp/supabase_link.log || true
            echo "Hint: verify SUPABASE_PROJECT_ID matches project URL subdomain exactly."
            exit 1
          fi

          echo "Linked Supabase project ref length: ${#linked_ref}"
          supabase db push
          supabase db execute --file supabase-seed.sql

      - name: Log migration status
        run: echo "✅ Supabase migrations applied successfully"
