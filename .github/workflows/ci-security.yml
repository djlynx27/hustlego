name: CI — Quality & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Secret scanning (Gitleaks) ─────────────────────────────────────────────
  # Prevents accidental credential leaks (API keys, tokens, passwords).
  # Architecture doc Phase 1: "pre-commit + CI secret scanning".
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Lint + Type-check ──────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (zero errors, complexity warnings tolerated)
        # --max-warnings 74: current tech debt baseline for cyclomatic complexity warnings.
        # Lower this number as large components (DriveScreen, TodayScreen, etc.) are refactored.
        # New violations beyond 73 will fail this check. Target: reach 0 warnings (ISO 25010 M≤10).
        run: npm run lint

      - name: TypeScript strict check
        run: npm run type-check

  # ─── Unit tests + Coverage ──────────────────────────────────────────────────
  # Coverage thresholds enforced via vitest.config.ts.
  # Architecture target: statements ≥ 78%, branches ≥ 65%, functions ≥ 83%, lines ≥ 80%.
  # All metrics crossed 80% ISO 25010 threshold in sprint #2 (March 2026).
  # Remaining gap: learningSync.ts async functions (need Supabase mock) and scoringEngine.ts time rules.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:run -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Build validation ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── SCA — Dependency vulnerability scan ────────────────────────────────────
  sca:
    name: SCA — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit production dependencies
        # --audit-level=high only blocks on HIGH/CRITICAL, not moderate
        run: npm audit --omit=dev --audit-level=high

  # ─── Secret scanning ────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so TruffleHog can scan all commits

      - name: TruffleHog — detect leaked secrets (pull requests)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified

      - name: TruffleHog — detect leaked secrets (pushes)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --results=verified

  # ─── CodeQL SAST ────────────────────────────────────────────────────────────
  codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript
