name: Build Android APK (TWA)

on:
  # Déclenché manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code entier (ex: 2)'
        required: false
        default: '1'

  # Ou automatiquement sur les tags v*
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 requis par Gradle / Android SDK
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Node.js pour @bubblewrap/cli
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Restaurer le keystore depuis le secret base64
      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          echo "Keystore restored ($(wc -c < android.keystore) bytes)"

      # Optionnel : patcher la version dans twa-manifest.json
      - name: Patch version
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          # Fallback to tag on tag-push event
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # strip leading 'v'
            VERSION_CODE=$(git rev-list --count HEAD)
          fi
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.appVersion = '$VERSION';
            m.appVersionCode = parseInt('$VERSION_CODE');
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('patched version', m.appVersion, 'code', m.appVersionCode);
          "

      # Build l'APK et l'AAB (bundle Play Store)
      - name: Build APK
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --keystorePath android.keystore \
            --keystoreKeyAlias hustlego \
            --keystorePassword "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --keyPassword "${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"

      # Upload APK comme artifact GitHub
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hustlego-apk
          path: |
            app-release-signed.apk
            app-release.aab
          if-no-files-found: error
          retention-days: 30

      # Créer une Release GitHub si lancé depuis un tag
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: 'HustleGo ${{ github.ref_name }}'
          body: |
            ## HustleGo ${{ github.ref_name }} — Android APK

            ### Installation directe (sideload)
            1. Télécharger `app-release-signed.apk`
            2. Activer "Sources inconnues" sur Android
            3. Installer l'APK

            ### Google Play Store
            Uploader `app-release.aab` dans la Play Console
            (Developer → Production → Créer une nouvelle version)
          files: |
            app-release-signed.apk
            app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
